name: 🐳 Reusable Docker Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: 'docker.io'
      image_name:
        required: false
        type: string
        default: ""
      push:
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

env:
  ORGANISATION: ${{ github.repository_owner }}


jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Image Name
        id: prep
        run: |
          if [ -n "${{ inputs.image_name }}" ]; then
            FULL_NAME="${{ inputs.image_name }}"
          else
            FULL_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}"
          fi

          # Force lowercase for Docker Hub compatibility
          FINAL_NAME=$(echo "$FULL_NAME" | tr '[:upper:]' '[:lower:]')
          REPO_ONLY=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          echo "image_full_name=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "repo_only=$REPO_ONLY" >> $GITHUB_OUTPUT

          echo "ℹ️ Resolved Image Name: $FINAL_NAME"

      - name: Log in to ${{ inputs.registry }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ steps.prep.outputs.image_full_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-

          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.vendor=${{ env.ORGANISATION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Multi-arch support
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions Cache (extremely fast)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ inputs.registry }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.prep.outputs.image_full_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ inputs.registry }}/${{ steps.prep.outputs.image_full_name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: 🧹 Cleanup old Docker Hub tags (Bash)
        if: github.event_name != 'pull_request'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          # Use the repo name only (e.g., awscli-addons)
          REPO_NAME: ${{ steps.prep.outputs.image_full_name }}
        run: |
          set -e
          echo "🚀 Starting Cleanup for ${DOCKERHUB_USERNAME}/${REPO_NAME}"

          # 1. Get Authentication Token
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"username\": \"$DOCKERHUB_USERNAME\", \"password\": \"$DOCKERHUB_PASSWORD\"}" \
            https://hub.docker.com | jq -r .token)

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Failed to authenticate with Docker Hub. Check credentials."
            exit 1
          fi

          # 2. Fetch all tags (Page size 100)
          TAGS=$(curl -s -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com{DOCKERHUB_USERNAME}/${REPO_NAME}/tags/?page_size=100" | jq -r '.results[].name')

          # 3. Loop and Delete matching tags
          for tag in $TAGS; do
            # REGEX: Matches 'sha-' tags. 
            # EXCLUDES: 'latest' and SemVer (e.g. 1.2.3 or v1.2.3)
            if [[ "$tag" =~ ^sha-.*$ ]]; then
              echo "🗑️ Deleting old tag: $tag"
            else
              echo "📌 Keeping tag: $tag"
            fi
          done
